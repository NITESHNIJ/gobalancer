run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - godot
    - misspell
    - prealloc
    - noctx

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
  goimports:
    local-prefixes: github.com/ninijhawan/gobalancer

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - errcheck
        - godot
