server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

pools:
  - name: default
    algorithm: round_robin
    backends:
      - id: backend-1
        addr: "http://localhost:8081"
        weight: 1
      - id: backend-2
        addr: "http://localhost:8082"
        weight: 1
      - id: backend-3
        addr: "http://localhost:8083"
        weight: 1
    health:
      interval: 10s
      timeout: 2s
      path: /health
      failure_threshold: 3
      success_threshold: 2
      mode: http
      passive_window: 60s
      passive_error_rate: 0.3

admin:
  addr: ":9001"

metrics:
  enabled: true
  path: /metrics

logging:
  level: info
  format: json
